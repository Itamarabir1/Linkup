apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkup-backend
  labels:
    app: linkup-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkup-backend
  template:
    metadata:
      labels:
        app: linkup-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/Itamarabir1/linkup-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # --- Secrets ---
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: SECRET_KEY
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: RABBITMQ_PASSWORD
            - name: BREVO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: BREVO_API_KEY
            - name: GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: GOOGLE_MAPS_API_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: GOOGLE_CLIENT_ID
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: FIREBASE_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: linkup-backend-secret
                  key: FIREBASE_CREDENTIALS_JSON
            # --- ConfigMap ---
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: linkup-backend-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: linkup-backend-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_USER
              valueFrom:
                configMapKeyRef:
                  name: linkup-backend-config
                  key: RABBITMQ_USER
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: linkup-backend-config
                  key: AWS_REGION
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: linkup-backend-config
                  key: S3_BUCKET_NAME
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: linkup-backend-config
                  key: FRONTEND_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10