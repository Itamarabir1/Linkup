apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkup-backend
  labels:
    app: linkup-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkup-backend
  template:
    metadata:
      labels:
        app: linkup-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: linkup-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: linkup-backend-config
                  key: POSTGRES_HOST
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: linkup-backend-config
                  key: REDIS_HOST
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: linkup-backend-config
                  key: RABBITMQ_HOST
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
