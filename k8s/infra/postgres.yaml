apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkup-db
  labels:
    app: linkup-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkup-db
  template:
    metadata:
      labels:
        app: linkup-db
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:15-3.3
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: linkup-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linkup-db-secret
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: linkup-db-config
                  key: database
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: linkup-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: linkup-db-pvc
  labels:
    app: linkup-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: linkup-db
  labels:
    app: linkup-db
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: linkup-db
