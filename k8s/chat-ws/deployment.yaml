apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkup-chat-ws
  labels:
    app: linkup-chat-ws
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkup-chat-ws
  template:
    metadata:
      labels:
        app: linkup-chat-ws
    spec:
      containers:
        - name: chat-ws
          image: linkup-chat-ws:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: linkup-chat-ws-secret
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: linkup-chat-ws-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
