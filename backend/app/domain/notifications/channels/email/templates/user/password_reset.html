<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; border: 1px solid #ddd;">
        <div style="background-color: #dc3545; color: white; padding: 20px; text-align: center;">
            <h1 style="margin: 0;">איפוס סיסמה</h1>
        </div>
        <div style="padding: 20px; line-height: 1.6; color: #333; text-align: right;">
            <p>שלום <strong>{{ user_name }}</strong>,</p>
            <p>קיבלנו בקשה לאיפוס הסיסמה בחשבון ה-LinkUp שלך.</p>
            
            <div style="background-color: #fff5f5; padding: 15px; border-radius: 5px; border-right: 4px solid #dc3545; text-align: center; margin: 20px 0;">
                <p style="margin: 0; font-size: 18px;">קוד האיפוס שלך (תקף ל-10 דקות):</p>
                <h2 style="margin: 10px 0; color: #dc3545; letter-spacing: 5px; font-size: 32px;">{{ code }}</h2>
            </div>

            <div style="background-color: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; font-size: 14px; margin-top: 20px;">
                <strong>אזהרת אבטחה:</strong> אם לא ביקשת לאפס את הסיסמה, אנא התעלם מהודעה זו ומומלץ לוודא שהסיסמה הנוכחית שלך חזקה מספיק.
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <a href="https://linkup.co.il/reset-password" style="background-color: #333; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">לדף איפוס הסיסמה</a>
            </div>
        </div>
    </div>
</body>
</html>
