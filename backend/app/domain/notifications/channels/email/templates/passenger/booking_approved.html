
<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; border: 1px solid #ddd;">
        <div style="background-color: #28a745; color: white; padding: 20px; text-align: center;">
            <h1 style="margin: 0;">יש לך טרמפ!</h1>
        </div>
        <div style="padding: 20px; line-height: 1.6; color: #333; text-align: right;">
            <p>שלום <strong>{{ passenger_name }}</strong>,</p>
            <p>שמחים לעדכן שהנהג/ת <strong>{{ driver_name }}</strong> אישר/ה את הצטרפותך לנסיעה.</p>
            <div style="background-color: #e9f7ef; padding: 15px; border-radius: 5px; border-right: 4px solid #28a745;">
                <p style="margin: 5px 0;"><strong>מאיפה:</strong> {{ origin }}</p>
                <p style="margin: 5px 0;"><strong>לאן:</strong> {{ destination }}</p>
                <p style="margin: 5px 0;"><strong>מתי:</strong> {{ ride_date }}</p>
            </div>
            <p>מומלץ ליצור קשר עם הנהג בתיאום סופי של המיקום.</p>
            <div style="text-align: center; margin-top: 30px;">
                <a href="https://your-app-url.com/my-bookings" style="background-color: #28a745; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">לפרטי הנסיעה המלאים</a>
            </div>
        </div>
    </div>
</body>
</html>
