<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; border: 1px solid #ddd;">
        <div style="background-color: #17a2b8; color: white; padding: 20px; text-align: center;">
            <h1 style="margin: 0;">נסיעה חדשה שמתאימה לך</h1>
        </div>
        <div style="padding: 20px; line-height: 1.6; color: #333; text-align: right;">
            <p>שלום <strong>{{ user_name }}</strong>,</p>
            <p>נרשמה נסיעה שיכולה להתאים לך:</p>
            <div style="background-color: #e7f3ff; padding: 15px; border-radius: 5px; border-right: 4px solid #17a2b8;">
                <p style="margin: 5px 0;"><strong>מאיפה:</strong> {{ origin }}</p>
                <p style="margin: 5px 0;"><strong>לאן:</strong> {{ destination }}</p>
                <p style="margin: 5px 0;"><strong>מתי:</strong> {{ ride_date }}</p>
                <p style="margin: 5px 0;"><strong>נהג:</strong> {{ driver_name }}</p>
            </div>
            <p>לחץ/י על הכפתור כדי לצפות בנסיעה ולבקש להצטרף.</p>
            <div style="text-align: center; margin-top: 30px;">
                <a href="{{ ride_url }}" style="background-color: #17a2b8; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">לצפייה בנסיעה ובקשת הצטרפות</a>
            </div>
        </div>
    </div>
</body>
</html>
