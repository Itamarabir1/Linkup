previews:
  generation: automatic

# Render Postgres databases
databases:
  - name: linkup-db
    # databaseName: linkup_app   # אופציונלי; אם לא תגדיר, Render ייצור שם אוטומטי
    # plan: standard             # ניתן להתאים מתוך הדשבורד (free/standard/...)

# אפליקציות ושירותים
services:
  # Redis כ-Key Value מנוהל (משמש גם לקאש וגם ל-Chat WS)
  - type: keyvalue
    name: linkup-redis
    plan: free

  # RabbitMQ כריסיבר פרטי (Outbox + Notifications)
  - type: pserv
    name: linkup-rabbitmq
    runtime: image
    image:
      url: docker.io/rabbitmq:3-management
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: guest
      - key: RABBITMQ_DEFAULT_PASS
        value: guest

  # Backend API (FastAPI)
  - type: web
    name: linkup-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    plan: free
    envVars:
      # DB מ-Render Postgres (משתמש ב-DATABASE_URL_RAW בקונפיג)
      - key: DATABASE_URL
        fromDatabase:
          name: linkup-db
          property: connectionString

      # Redis מ-Key Value
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: linkup-redis
          property: connectionString

      # RabbitMQ host (פורט ברירת מחדל 5672 כבר בהגדרות)
      - key: RABBITMQ_HOST
        fromService:
          type: pserv
          name: linkup-rabbitmq
          property: host

      # מצב Docker (בדומה ל-compose לוקאלי)
      - key: DOCKER_MODE
        value: "true"

      # הפניות URL לפרונט ול-API (להגדיר בערכי env בדשבורד)
      - key: FRONTEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false

      # Secrets – להגדיר פעם אחת בדשבורד (לא בקובץ!)
      - key: SECRET_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Outbox & Notifications Worker
  - type: worker
    name: linkup-outbox-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkup-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: linkup-redis
          property: connectionString
      - key: RABBITMQ_HOST
        fromService:
          type: pserv
          name: linkup-rabbitmq
          property: host
      - key: DOCKER_MODE
        value: "true"
      - key: SECRET_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        sync: false
      - key: EIA_API_KEY
        sync: false
    dockerCommand: python -m app.workers.main_worker

  # WebSocket Chat Server (Go)
  - type: web
    name: linkup-chat-ws
    runtime: docker
    dockerfilePath: chat-ws/Dockerfile
    dockerContext: chat-ws
    plan: free
    envVars:
      - key: PORT
        value: "8081"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: linkup-redis
          property: connectionString
      # משתמש באותו SECRET_KEY כמו הבקאנד (JWT)
      - key: SECRET_KEY
        fromService:
          type: web
          name: linkup-backend
          envVarKey: SECRET_KEY
      - key: JWT_ALGORITHM
        value: HS256

  # Frontend (Vite + React) – Static Site
  - type: web
    name: linkup-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      # נדרש להגדיר כאן את כתובת ה-API (למשל https://linkup-backend.onrender.com)
      - key: VITE_API_URL
        sync: false

