version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  chat-ws-go:
    build:
      context: .
      dockerfile: Dockerfile.go
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped

  chat-ws-ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GROK_API_KEY=${GROK_API_KEY}
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
