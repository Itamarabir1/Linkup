services:
  # --- Database: PostgreSQL + PostGIS ---
  db:
    image: postgis/postgis:15-3.3
    container_name: linkup_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - linkup_network

  # --- Cache & Pub/Sub: Redis ---
  # DB 0 → backend + outbox-worker
  # DB 1 → chat-ws (pub/sub) + outbox-worker (chat completion listener)
  redis:
    image: redis/redis-stack:7.2.0-v10   # גרסה קבועה, לא latest
    container_name: linkup_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - linkup_network

  # --- Message Broker: RabbitMQ ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: linkup_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # ממשק ניהול גרפי
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq  # נוסף: שומר queues בין restarts
    networks:
      - linkup_network

  # --- Outbox & Notifications Worker ---
  outbox-worker:
    build: ./backend
    container_name: linkup_outbox_worker
    command: python -m app.workers.main_worker
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - REDIS_DB=0                        # מפורש: DB 0 לbackend
      - REDIS_CHAT_DB=1                   # listener לאירועי סיום שיחה
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - linkup_network
    restart: unless-stopped

  # --- Backend: FastAPI ---
  backend:
    build: ./backend
    container_name: linkup_backend
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - REDIS_DB=0                        # מפורש: DB 0 לbackend
      - RABBITMQ_HOST=rabbitmq
      - DOCKER_MODE=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - linkup_network

  # --- WebSocket: Chat (Go) ---
  # JWT_SECRET חייב להיות זהה לזה שבbackend/.env
  chat-ws:
    build:
      context: ./chat-ws
      dockerfile: Dockerfile
    container_name: linkup_chat_ws
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - ./chat-ws/.env
    environment:
      - PORT=8081
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1  # DB 1 — מבודד מbackend
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - linkup_network

networks:
  linkup_network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:   # נוסף
