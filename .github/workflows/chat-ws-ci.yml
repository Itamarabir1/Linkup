name: Chat-WS CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'chat-ws/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'chat-ws/**'

defaults:
  run:
    working-directory: chat-ws

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o /dev/null ./cmd/server/...

      - name: Vet
        run: go vet ./...
